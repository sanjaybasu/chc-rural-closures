name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Lint scripts compile-check
        run: |
          for f in scripts/*.py tests/*.py; do
            python -m py_compile "$f"
          done

      - name: Smoke import test
        run: |
          python -c "import pandas, numpy, statsmodels, scipy, matplotlib, openpyxl"
          python -c "from differences import ATTgt; import linearmodels"
